name: 💡 Feature request
description: Suggest an idea or improvement for Stemmagraph
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea! 💡
        For broad discussions, consider opening a [Discussion](https://github.com/ltmoerdani/stemmagraph/discussions) first.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain point or use case. "Tell me why" before "tell me how".
      placeholder: I'm trying to ... but Stemmagraph currently doesn't ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would the ideal solution look like?
      description: Describe what you'd like to see. Mockups, examples from other tools, or rough sketches all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you considered.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      multiple: true
      options:
        - Family tree canvas (React Flow)
        - Member management / forms
        - Views (grid, table, list)
        - Auth / accounts
        - Data adapters (REST / Supabase / mock)
        - Export (PDF / image)
        - Documentation
        - Other
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
